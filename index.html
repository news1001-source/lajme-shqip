<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <title>Lajme Shqip - Agregator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #0f172a; color: #e2e8f0; line-height: 1.5; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        .app-header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 16px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; backdrop-filter: blur(10px); }
        .app-title { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 12px; letter-spacing: -0.5px; }
        .search-box { display: flex; gap: 8px; margin-bottom: 12px; }
        .search-input { flex: 1; padding: 12px 16px; border: 1px solid #334155; border-radius: 12px; background: #1e293b; color: #e2e8f0; font-size: 15px; outline: none; }
        .search-input:focus { border-color: #38bdf8; box-shadow: 0 0 0 3px rgba(56,189,248,0.1); }
        .search-input::placeholder { color: #64748b; }
        .btn { padding: 12px 20px; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
        .btn-primary { background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%); color: #0f172a; }
        .btn-primary:active { transform: scale(0.96); }
        .btn-secondary { background: #334155; color: #e2e8f0; }
        .btn-sm { padding: 8px 14px; font-size: 12px; border-radius: 8px; }
        .controls { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
        .controls::-webkit-scrollbar { display: none; }
        .chip { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid #334155; background: #1e293b; color: #94a3b8; transition: all 0.2s; white-space: nowrap; }
        .chip.active { background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%); color: #0f172a; border-color: transparent; }
        .content { padding: 12px; max-width: 800px; margin: 0 auto; }
        .loading { text-align: center; padding: 40px; color: #64748b; }
        .spinner { width: 40px; height: 40px; border: 3px solid #334155; border-top-color: #38bdf8; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .news-card { background: #1e293b; border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid #334155; transition: all 0.2s; cursor: pointer; }
        .news-card:active { transform: scale(0.98); }
        .news-source { display: inline-block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #38bdf8; margin-bottom: 8px; }
        .news-title { font-size: 16px; font-weight: 700; color: #f1f5f9; margin-bottom: 8px; line-height: 1.4; }
        .news-desc { font-size: 14px; color: #94a3b8; margin-bottom: 12px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .news-meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #64748b; }
        .news-actions { display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #334155; }
        .summary-box { background: #0f172a; border-radius: 12px; padding: 14px; margin-top: 12px; font-size: 14px; line-height: 1.6; color: #cbd5e1; border-left: 3px solid #38bdf8; display: none; }
        .summary-box.visible { display: block; }
        .summary-box.loading { display: block; color: #64748b; font-style: italic; }
        .error-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 600; z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.3); display: none; }
        .settings-panel { background: #1e293b; border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 1px solid #334155; display: none; }
        .settings-panel.visible { display: block; }
        .setting-row { margin-bottom: 16px; }
        .setting-label { font-size: 13px; font-weight: 600; color: #94a3b8; margin-bottom: 6px; display: block; }
        .setting-input { width: 100%; padding: 10px 14px; border: 1px solid #334155; border-radius: 10px; background: #0f172a; color: #e2e8f0; font-size: 14px; outline: none; }
        .setting-input:focus { border-color: #38bdf8; }
        .hint { font-size: 12px; color: #64748b; margin-top: 4px; }
        .empty-state { text-align: center; padding: 60px 20px; color: #64748b; }
        .badge-new { display: inline-block; background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%); color: white; font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 10px; margin-left: 8px; vertical-align: middle; }
        .status-bar { background: #1e293b; border-radius: 12px; padding: 12px 16px; margin-bottom: 12px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
        .status-bar.success { border: 1px solid #22c55e; color: #22c55e; }
        .status-bar.error { border: 1px solid #ef4444; color: #ef4444; }
        .status-bar.warn { border: 1px solid #f59e0b; color: #f59e0b; }
        .last-update { font-size: 11px; color: #64748b; text-align: center; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="app-header">
        <div class="app-title">🇦🇱 Lajme Shqip</div>
        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="Kërko lajme (p.sh. krim, politikë, sport)...">
            <button class="btn btn-primary" onclick="filterNews()">🔍</button>
            <button class="btn btn-secondary" onclick="toggleSettings()">⚙️</button>
        </div>
        <div class="controls" id="categoryChips">
            <div class="chip active" onclick="setCategory('all')">Të Gjitha</div>
            <div class="chip" onclick="setCategory('politike')">Politikë</div>
            <div class="chip" onclick="setCategory('kronike')">Kronikë</div>
            <div class="chip" onclick="setCategory('sport')">Sport</div>
            <div class="chip" onclick="setCategory('ekonomi')">Ekonomi</div>
            <div class="chip" onclick="setCategory('bote')">Botë</div>
        </div>
    </div>
    <div class="content">
        <div class="settings-panel" id="settingsPanel">
            <div class="setting-row">
                <label class="setting-label">OpenRouter API Key (falas tek openrouter.ai)</label>
                <input type="password" class="setting-input" id="apiKey" placeholder="sk-or-v1-...">
                <div class="hint">Merr çelësin falas tek <a href="https://openrouter.ai/keys" target="_blank" style="color:#38bdf8">openrouter.ai/keys</a>. Pa kartë krediti!</div>
            </div>
            <div class="setting-row">
                <label class="setting-label">Modeli AI</label>
                <select class="setting-input" id="aiModel">
                    <option value="meta-llama/llama-3.3-70b-instruct:free">Llama 3.3 70B (Falas)</option>
                    <option value="deepseek/deepseek-chat:free">DeepSeek V3 (Falas)</option>
                    <option value="google/gemini-2.5-flash-preview:free">Gemini 2.5 Flash (Falas)</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="saveSettings()" style="width:100%">Ruaj Cilësimet</button>
        </div>
        <div class="status-bar" id="statusBar" style="display:none"></div>
        <div class="last-update" id="lastUpdate"></div>
        <div id="newsContainer">
            <div class="loading">
                <div class="spinner"></div>
                <div>Duke ngarkuar lajmet...</div>
            </div>
        </div>
    </div>
    <div class="error-toast" id="errorToast"></div>

    <script>
        let allNews = [];
        let currentCategory = 'all';
        let apiKey = localStorage.getItem('openrouter_key') || '';
        let aiModel = localStorage.getItem('ai_model') || 'meta-llama/llama-3.3-70b-instruct:free';

        if (apiKey) document.getElementById('apiKey').value = apiKey;
        if (aiModel) document.getElementById('aiModel').value = aiModel;

        async function loadNews() {
            const container = document.getElementById('newsContainer');
            const statusBar = document.getElementById('statusBar');
            const lastUpdate = document.getElementById('lastUpdate');

            container.innerHTML = '<div class="loading"><div class="spinner"></div><div>Duke ngarkuar lajmet...</div></div>';
            statusBar.style.display = 'none';

            try {
                // Load from local news.json (same origin, no CORS!)
                const response = await fetch('news.json?' + Date.now());
                if (!response.ok) throw new Error('news.json not found');

                const data = await response.json();
                allNews = data.news || [];

                // Update status
                statusBar.style.display = 'flex';
                if (allNews.length > 0) {
                    statusBar.className = 'status-bar success';
                    statusBar.innerHTML = '<span>✅ ' + allNews.length + ' lajme nga ' + data.totalSources + ' burime</span><span onclick="loadNews()" style="cursor:pointer">🔄 Rifresko</span>';

                    const updateTime = new Date(data.lastUpdated);
                    lastUpdate.textContent = '🕐 Përditësimi i fundit: ' + updateTime.toLocaleString('sq-AL');
                } else {
                    statusBar.className = 'status-bar warn';
                    statusBar.innerHTML = '<span>⚠️ Asnjë lajm në news.json</span><span onclick="loadDemoData()" style="cursor:pointer">📋 Provo Demo</span>';
                    lastUpdate.textContent = '';
                }

                renderNews(allNews);
            } catch (e) {
                console.error('Gabim:', e);
                statusBar.style.display = 'flex';
                statusBar.className = 'status-bar error';
                statusBar.innerHTML = '<span>❌ news.json nuk u gjet. Rifresko faqen më vonë.</span><span onclick="loadDemoData()" style="cursor:pointer">📋 Provo Demo</span>';
                lastUpdate.textContent = '';
                renderNews([]);
            }
        }

        function loadDemoData() {
            const demoNews = [
                { title: "Krim i rëndë në Tiranë: Vritet një person në zonën e Kombinatit", description: "Një ngjarje e rëndë ka tronditur Tiranën këtë mëngjes. Policia ka nisur hetimet për zbardhjen e plotë të rrethanave.", source: "Panorama", category: "kronike", date: new Date().toISOString(), dateStr: "Sot, 09:30", isNew: true, id: "demo1", link: "#" },
                { title: "Rama takim me ambasadoren e BE-së: Diskutohet integrimi", description: "Kryeministri Edi Rama ka zhvilluar një takim me ambasadoren e Bashkimit Evropian në Tiranë për të diskutuar ecurinë e reformave.", source: "Shqiptarja", category: "politike", date: new Date(Date.now()-3600000).toISOString(), dateStr: "Sot, 08:15", isNew: true, id: "demo2", link: "#" },
                { title: "Bursat evropiane në rritje pas vendimit të Bankës Qendrore", description: "Tregjet financiare evropiane kanë reaguar pozitivisht ndaj vendimit të fundit të ECB-së për normat e interesit.", source: "Scan TV", category: "ekonomi", date: new Date(Date.now()-7200000).toISOString(), dateStr: "Sot, 07:00", isNew: true, id: "demo3", link: "#" },
                { title: "Dëshmitari i mbrojtur flet për kriminelët e drogës", description: "Një dëshmitar i mbrojtur ka dhënë detaje të reja për operacionin antidrogë të zhvilluar javën e kaluar.", source: "Blic", category: "kronike", date: new Date(Date.now()-10800000).toISOString(), dateStr: "Sot, 05:45", isNew: true, id: "demo4", link: "#" },
                { title: "Kombëtarja shqiptare përgatitet për ndeshjen e radhës", description: "Trajneri Sylvinho ka zhvilluar stërvitjen e fundit përpara ndeshjes kualifikuese për Euro 2028.", source: "TV Klan", category: "sport", date: new Date(Date.now()-14400000).toISOString(), dateStr: "Sot, 04:30", isNew: true, id: "demo5", link: "#" },
                { title: "Trump: Marrëveshja tregtare me Kinën është afër", description: "Presidenti amerikan ka bërë një deklaratë të fortë për marrëdhëniet tregtare mes SHBA-së dhe Kinës.", source: "Express", category: "bote", date: new Date(Date.now()-18000000).toISOString(), dateStr: "Sot, 03:00", isNew: true, id: "demo6", link: "#" },
                { title: "Shpërthim në një banesë në Durrës, dy të plagosur", description: "Një shpërthim i fuqishëm ka ndodhur në një banesë në qendër të Durrësit. Policia dhe zjarrfikëset ndodhen në vendngjarje.", source: "Lajmi i Fundit", category: "kronike", date: new Date(Date.now()-86400000).toISOString(), dateStr: "Dje, 18:20", isNew: false, id: "demo7", link: "#" },
                { title: "Ministria e Shëndetësisë: Rriten rastet e gripit sezonal", description: "Instituti i Shëndetit Publik njofton se rastet e gripit sezonal kanë shënuar rritje në javët e fundit.", source: "ABC News", category: "politike", date: new Date(Date.now()-90000000).toISOString(), dateStr: "Dje, 16:00", isNew: false, id: "demo8", link: "#" }
            ];

            allNews = demoNews;
            const statusBar = document.getElementById('statusBar');
            statusBar.style.display = 'flex';
            statusBar.className = 'status-bar warn';
            statusBar.innerHTML = '<span>⚠️ Mode DEMO - 8 lajme shembull</span><span onclick="loadNews()" style="cursor:pointer">🔄 Provo JSON</span>';
            document.getElementById('lastUpdate').textContent = '';
            renderNews(allNews);
        }

        function renderNews(news) {
            const container = document.getElementById('newsContainer');
            if (news.length === 0) {
                container.innerHTML = '<div class="empty-state"><div style="font-size:18px;font-weight:700;margin-bottom:8px">Nuk u gjet asnjë lajm</div><div style="font-size:14px">news.json nuk është gati akoma. Prit 5 minuta ose provo demo.</div><button class="btn btn-primary" onclick="loadNews()" style="margin-top:16px">🔄 Rifresko</button><button class="btn btn-secondary" onclick="loadDemoData()" style="margin-top:8px">📋 Provo Demo</button></div>';
                return;
            }

            container.innerHTML = news.map(item => 
                '<div class="news-card" onclick="window.open('' + item.link + '', '_blank')">' +
                '<div class="news-source">' + item.source + (item.isNew ? ' <span class="badge-new">I RI</span>' : '') + '</div>' +
                '<div class="news-title">' + escapeHtml(item.title) + '</div>' +
                '<div class="news-desc">' + escapeHtml(item.description) + '</div>' +
                '<div class="news-meta"><span>🕐 ' + item.dateStr + '</span><span>📂 ' + item.category + '</span></div>' +
                '<div class="news-actions" onclick="event.stopPropagation()">' +
                '<button class="btn btn-sm btn-secondary" onclick="summarizeNews('' + item.id + '', this)">🤖 Përmbledhje AI</button>' +
                '<button class="btn btn-sm btn-secondary" onclick="shareNews('' + item.link + '', '' + escapeHtml(item.title) + '')">📤 Shpërndaj</button>' +
                '</div>' +
                '<div class="summary-box" id="summary-' + item.id + '"></div>' +
                '</div>'
            ).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function filterNews() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!query) { setCategory('all'); return; }
            const filtered = allNews.filter(n => n.title.toLowerCase().includes(query) || n.description.toLowerCase().includes(query) || n.source.toLowerCase().includes(query));
            renderNews(filtered);
        }

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            if (cat === 'all') { renderNews(allNews); }
            else { renderNews(allNews.filter(n => n.category === cat)); }
        }

        async function summarizeNews(id, btn) {
            const box = document.getElementById('summary-' + id);
            const item = allNews.find(n => n.id === id);
            if (!apiKey) {
                showError('Vendosni OpenRouter API Key në cilësimet (⚙️)!');
                toggleSettings();
                return;
            }
            box.className = 'summary-box loading visible';
            box.textContent = 'Duke analizuar me AI...';
            btn.disabled = true;
            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + apiKey,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.href,
                        'X-Title': 'Lajme Shqip'
                    },
                    body: JSON.stringify({
                        model: aiModel,
                        messages: [
                            { role: 'system', content: 'Je një asistent që përmbledh lajmet në gjuhën shqipe. Përmbledh në 2-3 fjali kryesoret.' },
                            { role: 'user', content: 'Përmbledh këtë lajm në shqip: Titulli: "' + item.title + '". Përmbajtja: "' + item.description + '".' }
                        ],
                        max_tokens: 200
                    })
                });
                if (!response.ok) throw new Error('API Error: ' + response.status);
                const data = await response.json();
                const summary = data.choices?.[0]?.message?.content || 'Nuk u gjend përmbledhje.';
                box.className = 'summary-box visible';
                box.innerHTML = '<strong>🤖 Përmbledhje:</strong><br>' + escapeHtml(summary);
            } catch (e) {
                box.className = 'summary-box visible';
                box.innerHTML = '<span style="color:#ef4444">Gabim: ' + escapeHtml(e.message) + '</span>';
            } finally {
                btn.disabled = false;
            }
        }

        function shareNews(link, title) {
            if (navigator.share) {
                navigator.share({ title: title, url: link });
            } else {
                navigator.clipboard.writeText(link);
                showError('Linku u kopjua! ✅');
            }
        }

        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('visible');
        }

        function saveSettings() {
            apiKey = document.getElementById('apiKey').value.trim();
            aiModel = document.getElementById('aiModel').value;
            localStorage.setItem('openrouter_key', apiKey);
            localStorage.setItem('ai_model', aiModel);
            showError('Cilësimet u ruajtën! ✅');
            toggleSettings();
        }

        function showError(msg) {
            const toast = document.getElementById('errorToast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 4000);
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            if (e.target.value === '') setCategory('all');
        });
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') filterNews();
        });

        let touchStartY = 0;
        document.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; });
        document.addEventListener('touchend', e => {
            const touchEndY = e.changedTouches[0].clientY;
            if (touchEndY - touchStartY > 150 && window.scrollY < 50) {
                loadNews();
            }
        });

        // Service Worker for offline
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCJpbnN0YWxsIiwoZT0+c2VsZi5za2lwV2FpdGluZygpKSk7c2VsZi5hZGRFdmVudExpc3RlbmVyKCJmZXRjaCIsKGU9PmUucmVzcG9uZFdpdGgoZmV0Y2goZS5yZXF1ZXN0KS5jYXRjaCgoKT0+bmV3IFJlc3BvbnNlKCJPZmZsaW5lIikpKSk7');
        }

        loadNews();
    </script>
</body>
</html>
